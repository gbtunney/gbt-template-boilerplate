name: Label Issue

on:
    issues:
        types:
            - opened
            - edited
            - reopened

permissions:
    issues: write
    contents: read

jobs:
    label-issue:
        name: label-issue
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Label issue
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
              run: |
                  bash scripts/issues/label-issue.sh \
                    --repo "$REPO" \
                    --issue "${{ github.event.issue.number }}"
