# NOTES:
#   - calling contained workflow was kind of pointless, so this is an example
# ============================================================

name: 🧱 Build Workflow

on:
    push:

jobs:
    setup:
        uses: ./.github/workflows/setup-node-pnpm.yml
        with:
            install: true
            build: true
            fix: true
            test: true
            check: true
            DEBUG: false

    validate:
        name: ✅ Continue if clean
        runs-on: ubuntu-latest
        needs: setup
        if: needs.setup.outputs.dirty == 'false'
        steps:
            - run: echo "Repo is clean, build successful!"
