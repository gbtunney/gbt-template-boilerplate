name: CI

on:
    pull_request:
    workflow_dispatch:
        inputs:
            affected_targets:
                description: Nx affected targets to run
                required: true
                default: lint,typecheck,test,build
                type: string
            base_ref:
                description: Base ref for nx affected
                required: true
                default: origin/main
                type: string
            head_ref:
                description: Head ref for nx affected
                required: true
                default: HEAD
                type: string
    push:
        branches:
            - main

permissions:
    contents: read

env:
    HUSKY: 0
    NX_AFFECTED_TARGETS: ${{ inputs.affected_targets || 'lint,typecheck,test,build' }}
    NX_BASE_REF: ${{ inputs.base_ref || 'origin/main' }}
    NX_HEAD_REF: ${{ inputs.head_ref || 'HEAD' }}

jobs:
    reporting:
        uses: ./.github/workflows/reporting.yml
        with:
            mode: report
            check_mode: skip
            run_install: false
            require_lockfile: false
            require_clean_repo: false
            run_build: false
            run_test: false
            run_docs_build: false
            nx_cache_reset: false
            pnpm_store_reset: false

    ci:
        needs: reporting
        runs-on: ubuntu-latest

        steps:
            # 🌸 setup
            - name: 🌸 Checkout Repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: 📦 Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: false

            - name: 🟢 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: 📥 Install Dependencies
              run: pnpm install --frozen-lockfile

            # 🧪 affected verification
            - name: 🧪 Run Nx Affected Tasks
              run: |
                  pnpm exec nx affected \
                    -t "$NX_AFFECTED_TARGETS" \
                    --base="$NX_BASE_REF" \
                    --head="$NX_HEAD_REF"

            - run: npx nx fix-ci
              if: always()
