name: Reporting Dispatch

on:
    workflow_dispatch:
        inputs:
            mode:
                description: Failure mode
                required: true
                default: report
                type: choice
                options:
                    - report
                    - abort_on_error
            check_mode:
                description: Check routine mode
                required: true
                default: check
                type: choice
                options:
                    - fix
                    - check
                    - skip
            run_install:
                description: Run install diagnostics
                required: true
                default: true
                type: boolean
            require_lockfile:
                description: Treat frozen lockfile install as required
                required: true
                default: false
                type: boolean
            require_clean_repo:
                description: Fail if repository becomes dirty
                required: true
                default: false
                type: boolean
            run_build:
                description: Run pnpm build
                required: true
                default: false
                type: boolean
            run_test:
                description: Run pnpm test
                required: true
                default: false
                type: boolean
            run_docs_build:
                description: Run docs build routine
                required: true
                default: false
                type: boolean
            nx_cache_reset:
                description: Run nx cache reset before routines
                required: true
                default: false
                type: boolean
            pnpm_store_reset:
                description: Run pnpm store prune before routines
                required: true
                default: false
                type: boolean

permissions:
    contents: read

jobs:
    reporting:
        uses: ./.github/workflows/reporting.yml
        with:
            mode: ${{ inputs.mode }}
            check_mode: ${{ inputs.check_mode }}
            run_install: ${{ inputs.run_install }}
            require_lockfile: ${{ inputs.require_lockfile }}
            require_clean_repo: ${{ inputs.require_clean_repo }}
            run_build: ${{ inputs.run_build }}
            run_test: ${{ inputs.run_test }}
            run_docs_build: ${{ inputs.run_docs_build }}
            nx_cache_reset: ${{ inputs.nx_cache_reset }}
            pnpm_store_reset: ${{ inputs.pnpm_store_reset }}
