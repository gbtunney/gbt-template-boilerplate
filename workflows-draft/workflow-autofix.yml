name: Autofix

# ─────────────────────────────────────────────────────────────
# Manually triggered workflow for fixing and committing changes
# without opening a Codespace. Useful for:
#   - Updating the lockfile after dependency changes
#   - Running the formatter and committing the result
#   - Rebuilding and committing docs output
#
# Flow:
#   1. Guard — refuse to run on main
#   2. Call ci-core with fix configuration (toggled via inputs)
#   3. If repo is dirty, derive commit scope from nx affected
#   4. Commit and push to current branch
#   5. Re-call ci-core in report mode to verify state
# ─────────────────────────────────────────────────────────────

on:
    workflow_dispatch:
        inputs:
            fix_lint:
                description: 'Run pnpm fix (formatter / linter)'
                required: false
                default: true
                type: boolean
            fix_lockfile:
                description: 'Update lockfile (relaxed install)'
                required: false
                default: false
                type: boolean
            fix_docs:
                description: 'Rebuild docs output'
                required: false
                default: false
                type: boolean
            build_mode:
                description: 'Build after fix: require | report | skip'
                required: false
                default: skip
                type: choice
                options: [require, report, skip]
            commit_message_type:
                description: 'Conventional commit type prefix'
                required: false
                default: chore
                type: choice
                options: [chore, fix, docs, build]

permissions:
    contents: write

env:
    HUSKY: 0

jobs:
    autofix:
        runs-on: ubuntu-latest

        steps:
            # ── Guard: refuse to run on main ─────────────────────────
            - name: 🚫 Refuse to run on main
              shell: bash
              run: |
                  if [ "${{ github.ref_name }}" = "main" ]; then
                    echo "❌ Autofix cannot run on main. Checkout a feature or fix branch first."
                    exit 1
                  fi
                  echo "✅ Branch: ${{ github.ref_name }}"

            # ── Checkout ──────────────────────────────────────────────
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  # Use a PAT or the default GITHUB_TOKEN.
                  # GITHUB_TOKEN is fine here since we're pushing to the
                  # same branch and not trying to trigger other workflows.
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: pnpm

            # ── Install ───────────────────────────────────────────────
            # Always use relaxed install here — the point of fix_lockfile
            # is to generate a fresh one, so frozen would defeat the purpose.
            - name: 📦 Install
              run: pnpm install --no-frozen-lockfile

            # ── Fix: lint / format ────────────────────────────────────
            - name: ✨ Fix lint
              if: ${{ inputs.fix_lint }}
              continue-on-error: true
              run: pnpm fix

            # ── Fix: docs ─────────────────────────────────────────────
            - name: 📘 Rebuild docs
              if: ${{ inputs.fix_docs }}
              continue-on-error: true
              run: pnpm docs:build

            # ── Build (optional) ──────────────────────────────────────
            - name: 🏗️ Build
              if: ${{ inputs.build_mode != 'skip' }}
              continue-on-error: ${{ inputs.build_mode == 'report' }}
              run: pnpm build

            # ── Derive commit scope from nx affected ──────────────────
            - name: 🔎 Derive commit scope
              id: scope
              shell: bash
              run: |
                  SCOPE=$(bash scripts/get-scope.sh --base origin/main --head HEAD)
                  echo "scope=$SCOPE" >> $GITHUB_OUTPUT
                  echo "📦 Commit scope: $SCOPE"

            # ── Check if repo is dirty ────────────────────────────────
            - name: 🧼 Check repo status
              id: dirty
              shell: bash
              run: |
                  STATUS=$(git status --porcelain)
                  if [ -n "$STATUS" ]; then
                    echo "dirty=true" >> $GITHUB_OUTPUT
                    echo "⚠️ Repo is dirty. Files to commit:"
                    echo "$STATUS"
                  else
                    echo "dirty=false" >> $GITHUB_OUTPUT
                    echo "✅ Nothing to commit."
                  fi

            # ── Commit and push ───────────────────────────────────────
            - name: 📝 Commit changes
              if: ${{ steps.dirty.outputs.dirty == 'true' }}
              shell: bash
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Build a descriptive commit message body from what was toggled.
                  PARTS=""
                  if [ "${{ inputs.fix_lint }}" = "true" ];     then PARTS="${PARTS}format, "; fi
                  if [ "${{ inputs.fix_lockfile }}" = "true" ];  then PARTS="${PARTS}lockfile, "; fi
                  if [ "${{ inputs.fix_docs }}" = "true" ];      then PARTS="${PARTS}docs, "; fi
                  PARTS=$(echo "$PARTS" | sed 's/, $//')  # trim trailing comma

                  SCOPE="${{ steps.scope.outputs.scope }}"
                  TYPE="${{ inputs.commit_message_type }}"

                  SUBJECT="${TYPE}(${SCOPE}): autofix — ${PARTS}"

                  git add -A
                  git commit -m "$SUBJECT" \
                    -m "Triggered by: @${{ github.actor }} via workflow_dispatch" \
                    -m "Branch: ${{ github.ref_name }}" \
                    -m "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

                  echo "✅ Committed: $SUBJECT"

            - name: 🚀 Push
              if: ${{ steps.dirty.outputs.dirty == 'true' }}
              run: git push origin ${{ github.ref_name }}

            - name: ℹ️ Nothing to commit
              if: ${{ steps.dirty.outputs.dirty == 'false' }}
              run: echo "No changes detected — skipping commit and push."

    # ── Verify: re-run ci-core after commit ──────────────────────
    # Runs in report mode so it never fails the autofix workflow,
    # but gives you a full status read on the post-fix state.
    verify:
        needs: autofix
        if: always()
        uses: ./.github/workflows/ci-core.yml
        with:
            mode: report
            check_mode: check
            build_mode: skip
            test_mode: skip
            docs_mode: skip
            require_lockfile: false
            require_clean_repo: true
