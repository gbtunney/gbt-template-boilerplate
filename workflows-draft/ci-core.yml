name: CI Core

# ─────────────────────────────────────────────────────────────
# Reusable workflow. Call this from other workflows with inputs.
# Not triggered directly except via workflow_dispatch for debugging.
#
# mode (global fallback):
#   require  → failure fails the job (default)
#   report   → failure is logged but job continues
#
# per-step _mode inputs (override global mode for that step):
#   skip     → step is skipped entirely, result = "skipped"
#   require  → failure fails the job
#   report   → failure is logged, job continues
# ─────────────────────────────────────────────────────────────

on:
    workflow_dispatch:
        inputs:
            mode:
                description: 'Global error handling: require | report'
                required: false
                default: require
                type: choice
                options: [require, report]

            check_mode:
                description: 'Lint/fix: fix | check | skip'
                required: false
                default: check
                type: choice
                options: [fix, check, skip]

            build_mode:
                description: 'Build: require | report | skip'
                required: false
                default: report
                type: choice
                options: [require, report, skip]

            test_mode:
                description: 'Tests: require | report | skip'
                required: false
                default: skip
                type: choice
                options: [require, report, skip]
            docs_mode:
                description: 'Docs build: require | report | skip'
                required: false
                default: skip
                type: choice
                options: [require, report, skip]
            require_lockfile:
                description: 'Fail if frozen lockfile install fails'
                required: false
                default: false
                type: boolean
            require_clean_repo:
                description: 'Fail if repo is dirty at end'
                required: false
                default: false
                type: boolean
            nx_cache_reset:
                description: 'Reset Nx cache before running'
                required: false
                default: false
                type: boolean
            pnpm_store_reset:
                description: 'Prune pnpm store before install'
                required: false
                default: false
                type: boolean

    workflow_call:
        inputs:
            mode:
                description: 'Global error handling: require | report'
                required: false
                default: require
                type: string
            check_mode:
                description: 'Lint/fix: fix | check | skip'
                required: false
                default: check
                type: string
            build_mode:
                description: 'Build: require | report | skip'
                required: false
                default: report
                type: string
            test_mode:
                description: 'Tests: require | report | skip'
                required: false
                default: skip
                type: string
            docs_mode:
                description: 'Docs build: require | report | skip'
                required: false
                default: skip
                type: string
            require_lockfile:
                required: false
                default: false
                type: boolean
            require_clean_repo:
                required: false
                default: false
                type: boolean
            run_build:
                required: false
                default: false
                type: boolean
            nx_cache_reset:
                required: false
                default: false
                type: boolean
            pnpm_store_reset:
                required: false
                default: false
                type: boolean

        outputs:
            lint_result:
                description: 'success | failure | skipped'
                value: ${{ jobs.core.outputs.lint_result }}
            test_result:
                description: 'success | failure | skipped'
                value: ${{ jobs.core.outputs.test_result }}
            docs_result:
                description: 'success | failure | skipped'
                value: ${{ jobs.core.outputs.docs_result }}
            build_result:
                description: 'success | failure | skipped'
                value: ${{ jobs.core.outputs.build_result }}
            repository_status:
                description: 'clean | dirty'
                value: ${{ jobs.core.outputs.repository_status }}

permissions:
    contents: read

env:
    HUSKY: 0

jobs:
    core:
        runs-on: ubuntu-latest

        outputs:
            lint_result: ${{ steps.lint_result.outputs.value }}
            test_result: ${{ steps.test_result.outputs.value }}
            docs_result: ${{ steps.docs_result.outputs.value }}
            build_result: ${{ steps.build_result.outputs.value }}
            repository_status: ${{ steps.dirty_check.outputs.status }}

        steps:
            # ── Validate inputs ──────────────────────────────────────
            # workflow_call only supports string/boolean, not choice,
            # so we validate here to catch typos from callers early.
            - name: 🔍 Validate inputs
              shell: bash
              run: |
                  valid=true
                  for val in "${{ inputs.mode }}" ; do
                    case "$val" in require|report) ;; *)
                      echo "❌ Invalid mode: '$val'. Expected: require | report"
                      valid=false ;;
                    esac
                  done
                  for val in "${{ inputs.check_mode }}" ; do
                    case "$val" in fix|check|skip) ;; *)
                      echo "❌ Invalid check_mode: '$val'. Expected: fix | check | skip"
                      valid=false ;;
                    esac
                  done
                  for val in "${{ inputs.build_mode }}" "${{ inputs.test_mode }}" "${{ inputs.docs_mode }}" ; do
                    case "$val" in require|report|skip) ;; *)
                      echo "❌ Invalid mode value: '$val'. Expected: require | report | skip"
                      valid=false ;;
                    esac
                  done
                  if [ "$valid" = "false" ]; then exit 1; fi

            # ── Checkout ─────────────────────────────────────────────
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: pnpm

            # ── Input summary ─────────────────────────────────────────
            - name: 🌸 Input summary
              shell: bash
              run: |
                  echo "mode             = ${{ inputs.mode }}"
                  echo "check_mode       = ${{ inputs.check_mode }}"
                  echo "build_mode        = ${{ inputs.build_mode }}"
                  echo "test_mode        = ${{ inputs.test_mode }}"
                  echo "docs_mode        = ${{ inputs.docs_mode }}"
                  echo "require_lockfile = ${{ inputs.require_lockfile }}"
                  echo "require_clean_repo = ${{ inputs.require_clean_repo }}"
                  echo "nx_cache_reset   = ${{ inputs.nx_cache_reset }}"
                  echo "pnpm_store_reset = ${{ inputs.pnpm_store_reset }}"

            # ── Environment / repo reports ────────────────────────────
            - name: 🩺 Report environment
              if: always()
              continue-on-error: true
              run: pnpm report:env

            - name: 🗂️ Report repository (pre-install)
              if: always()
              continue-on-error: true
              run: pnpm report:repo

            # ── pnpm store prune ──────────────────────────────────────
            - name: 🧺 Prune pnpm store
              if: ${{ inputs.pnpm_store_reset }}
              run: pnpm store prune

            # ── Install ───────────────────────────────────────────────
            # Try frozen first. If it fails:
            #   require_lockfile=true  → fail the job
            #   require_lockfile=false → fall back to relaxed install
            - name: 📦 Install (frozen lockfile)
              id: install_frozen
              continue-on-error: true
              run: pnpm install --frozen-lockfile

            - name: 🚧 Fail — frozen lockfile required but failed
              if: ${{ steps.install_frozen.outcome == 'failure' && inputs.require_lockfile }}
              shell: bash
              run: |
                  echo "❌ Frozen lockfile install failed and require_lockfile=true"
                  exit 1

            - name: 📦 Install (relaxed fallback)
              if: ${{ steps.install_frozen.outcome == 'failure' && !inputs.require_lockfile }}
              run: pnpm install --no-frozen-lockfile

            # ── Cache resets (after install, before any nx commands) ──
            - name: 🧹 Reset Nx cache
              if: ${{ inputs.nx_cache_reset }}
              run: pnpm nx reset

            # ── Lint / fix ────────────────────────────────────────────
            - name: ✨ Lint — fix
              id: lint_fix
              if: ${{ inputs.check_mode == 'fix' }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: pnpm fix

            - name: ✅ Lint — check
              id: lint_check
              if: ${{ inputs.check_mode == 'check' }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: pnpm check

            - name: 📋 Lint result
              id: lint_result
              if: always()
              shell: bash
              run: |
                  if [ "${{ inputs.check_mode }}" = "skip" ]; then
                    echo "value=skipped" >> $GITHUB_OUTPUT
                  elif [ "${{ steps.lint_fix.outcome }}" = "failure" ] || [ "${{ steps.lint_check.outcome }}" = "failure" ]; then
                    echo "value=failure" >> $GITHUB_OUTPUT
                  else
                    echo "value=success" >> $GITHUB_OUTPUT
                  fi

            # ── Build ──────────────────────────────────────────────────
            - name: 🏗️ Build
              id: build
              if: ${{ inputs.build_mode != 'skip' }}
              continue-on-error: ${{ inputs.build_mode == 'report' }}
              run: pnpm build

            - name: 📋 Build result
              id: build_result
              if: always()
              shell: bash
              run: |
                  if [ "${{ inputs.build_mode }}" = "skip" ]; then
                    echo "value=skipped" >> $GITHUB_OUTPUT
                  elif [ "${{ steps.build.outcome }}" = "failure" ]; then
                    echo "value=failure" >> $GITHUB_OUTPUT
                  else
                    echo "value=success" >> $GITHUB_OUTPUT
                  fi

            # ── Test ──────────────────────────────────────────────────
            - name: 🧪 Test
              id: test
              if: ${{ inputs.test_mode != 'skip' }}
              continue-on-error: ${{ inputs.test_mode == 'report' }}
              run: pnpm test

            - name: 📋 Test result
              id: test_result
              if: always()
              shell: bash
              run: |
                  if [ "${{ inputs.test_mode }}" = "skip" ]; then
                    echo "value=skipped" >> $GITHUB_OUTPUT
                  elif [ "${{ steps.test.outcome }}" = "failure" ]; then
                    echo "value=failure" >> $GITHUB_OUTPUT
                  else
                    echo "value=success" >> $GITHUB_OUTPUT
                  fi

            # ── Docs ──────────────────────────────────────────────────
            - name: 📘 Docs build
              id: docs
              if: ${{ inputs.docs_mode != 'skip' }}
              continue-on-error: ${{ inputs.docs_mode == 'report' }}
              run: pnpm docs:build

            - name: 📋 Docs result
              id: docs_result
              if: always()
              shell: bash
              run: |
                  if [ "${{ inputs.docs_mode }}" = "skip" ]; then
                    echo "value=skipped" >> $GITHUB_OUTPUT
                  elif [ "${{ steps.docs.outcome }}" = "failure" ]; then
                    echo "value=failure" >> $GITHUB_OUTPUT
                  else
                    echo "value=success" >> $GITHUB_OUTPUT
                  fi

            # ── Repo cleanliness ──────────────────────────────────────
            - name: 🧼 Check repo cleanliness
              id: dirty_check
              if: always()
              continue-on-error: ${{ !inputs.require_clean_repo }}
              shell: bash
              run: |
                  STATUS=$(git status --porcelain)
                  if [ -n "$STATUS" ]; then
                    echo "status=dirty" >> $GITHUB_OUTPUT
                    echo "⚠️ Repo is dirty. Changed files:"
                    echo "$STATUS"
                    if [ "${{ inputs.require_clean_repo }}" = "true" ]; then
                      exit 1
                    fi
                  else
                    echo "status=clean" >> $GITHUB_OUTPUT
                    echo "✅ Repo is clean."
                  fi

            # ── Summary ───────────────────────────────────────────────
            - name: 🌈 Summary
              if: always()
              shell: bash
              run: |
                  echo ""
                  echo "┌─────────────────────────────────┐"
                  echo "│         CI Core Summary          │"
                  echo "├──────────────┬──────────────────┤"
                  echo "│ lint         │ ${{ steps.lint_result.outputs.value }}"
                  echo "│ build        │ ${{ steps.build_result.outputs.value }}"
                  echo "│ test         │ ${{ steps.test_result.outputs.value }}"
                  echo "│ docs         │ ${{ steps.docs_result.outputs.value }}"
                  echo "│ repo         │ ${{ steps.dirty_check.outputs.status }}"
                  echo "└──────────────┴──────────────────┘"
