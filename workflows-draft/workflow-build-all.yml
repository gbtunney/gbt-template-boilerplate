name: Build All

on:
    workflow_dispatch:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

env:
    HUSKY: 0

jobs:
    reporting:
        uses: ./.github/workflows/reporting.yml
        with:
            mode: report
            check_mode: skip
            run_install: true
            require_lockfile: false
            require_clean_repo: false
            run_build: true
            run_test: false
            run_docs_build: false
            nx_cache_reset: false
            pnpm_store_reset: false

    build-all:
        needs: reporting
        runs-on: ubuntu-latest

        steps:
            # 🌸 setup
            - name: 🌸 Checkout Repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: 📦 Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: 🟢 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm

            - name: 📥 Install Dependencies
              run: pnpm install

            # 🩺 report and fix
            - name: ✨ Run Fix Routine
              run: |
                  if ! pnpm fix; then
                    echo "::warning::pnpm fix failed (report-only mode)"
                  fi

            # 🧪 verify
            - name: 🧪 Build and Test All Projects
              run: |
                  pnpm test
